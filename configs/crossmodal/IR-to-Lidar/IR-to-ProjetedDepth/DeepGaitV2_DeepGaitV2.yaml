data_cfg:
  dataset_name: MMGait_Cross_IRsils_LiDARDepth
  dataset_root: /path/to/MMGait
  dataset_partition: ./datasets/MMGait/mmgait.json
  num_workers: 8
  data_in_use: [false, false, false, false, true, true, false, false, false, false, false, false, false] 
  # depth, event, heatmap, ir, ir_sils, lidar_depth, lidar_points, pose2d, pose3d, radar_depth, radar4d, rgb, rgb_sils
  remove_no_gallery: false # Remove probe if no gallery for it
  test_dataset_name: MMGait_Cross_IRsils_LiDARDepth

evaluator_cfg:
  enable_float16: true
  restore_ckpt_strict: true
  restore_hint: 60000
  save_name: DeepGaitV2_DeepGaitV2
  eval_func: mmgait_cross_modal_evaluation
  sampler:
    batch_shuffle: false
    batch_size: 8
    sample_type: all_ordered # all indicates whole sequence used to test, while ordered means input sequence by its natural order; Other options:   fixed_unordered
    frames_all_limit: 720 # limit the number of sampled frames to prevent out of memory
  metric: euc # cos
  transform:
    - type: BaseSilTransform
    - type: BaseRgbTransform



loss_cfg:
  - loss_term_weight: 1.0
    scale: 16
    type: CrossEntropyLoss
    log_prefix: softmax1
    log_accuracy: true
  - loss_term_weight: 1.0
    scale: 16
    type: CrossEntropyLoss
    log_prefix: softmax2
    log_accuracy: true
  - loss_term_weight: 1.0
    margin: 0.2
    type: Cross_TripletLoss
    log_prefix: cross_triplet1
  - loss_term_weight: 1.0
    margin: 0.2
    type: Cross_TripletLoss
    log_prefix: cross_triplet2


model_cfg:
  model: Cross_img2img
  Backbone:
    mode: 2d
    modal1_in_channels: 1
    modal2_in_channels: 3
    layers:
      - 1
      - 1
      - 1
      - 1
    channels: 
      - 64
      - 128 
      - 256
      - 512
  SeparateBNNecks:
    class_num: 200

optimizer_cfg:
  lr: 0.1
  momentum: 0.9
  solver: SGD
  weight_decay: 0.0005

scheduler_cfg:
  gamma: 0.1
  milestones: # Learning Rate Reduction at each milestones
    - 20000
    - 40000
    - 50000
  scheduler: MultiStepLR

trainer_cfg:
  enable_float16: true # half_percesion float for memory reduction and speedup
  fix_BN: false
  log_iter: 100
  with_test: true
  restore_ckpt_strict: true
  restore_hint: 0
  save_iter: 30000
  save_name: DeepGaitV2_DeepGaitV2
  sync_BN: true
  total_iter: 60000
  sampler:
    batch_shuffle: true
    batch_size:
      - 8 #                 TripletSampler, batch_size[0] indicates Number of Identity
      - 8 #                 batch_size[1] indicates Samples sequqnce for each Identity
    frames_num_fixed: 30 # fixed frames number for training
    frames_skip_num: 4
    sample_type: fixed_unordered # fixed control input frames number, unordered for controlling order of input tensor; Other options: unfixed_ordered or all_ordered
    type: TripletSampler
  transform:
    - type: Compose
      trf_cfg:
        - type: RandomPerspective
          prob: 0.2
        - type: BaseSilTransform
        - type: RandomHorizontalFlip
          prob: 0.2
        - type: RandomRotate
          prob: 0.2
    - type: Compose
      trf_cfg:
        - type: RandomPerspective
          prob: 0.2
        - type: BaseRgbTransform
        - type: RandomHorizontalFlip
          prob: 0.2
        - type: RandomRotate
          prob: 0.2