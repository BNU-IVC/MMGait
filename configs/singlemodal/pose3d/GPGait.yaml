data_cfg:
  dataset_name: MMGait_Single_Pose3d
  dataset_root: /path/to/MMGait
  dataset_partition: ./datasets/MMGait/mmgait.json
  num_workers: 8
  data_in_use: [false, false, false, false, false, false, false, false, true, false, false, false, false] 
  # depth, event, heatmap, ir, ir_sils, lidar_depth, lidar_points, pose2d, pose3d, radar4d, radar_depth, rgb, rgb_sils  
  remove_no_gallery: false # Remove probe if no gallery for it
  test_dataset_name: MMGait_Single_Pose3d

evaluator_cfg:
  enable_float16: true
  restore_ckpt_strict: true
  restore_hint: 40000
  save_name: GPGait
  eval_func: mmgait_single_modal_evaluation
  sampler:
    batch_shuffle: false
    batch_size: 8
    sample_type: all_ordered # all indicates whole sequence used to test, while ordered means input sequence by its natural order; Other options:   fixed_unordered
    frames_all_limit: 720 # limit the number of sampled frames to prevent out of memory
  metric: euc # cos
  transform:
    - type: Compose
      trf_cfg:
        - type: RescaleCenter
        - type: HOD_MultiInput
        - type: SkeletonInput

loss_cfg:
  - loss_term_weight: 1.0
    margin: 0.3
    type: TripletLoss
    log_prefix: triplet
    is_hard_loss: true
  - loss_term_weight: 1.0
    scale: 16
    type: CrossEntropyLoss
    log_prefix: softmax
    log_accuracy: true
    label_smooth: false

model_cfg:
  model: gpgait
  in_channels:
    - 3 
    - 64
    - 64
    - 128
    - 256
  num_class: 200
  share_num: 3


optimizer_cfg:
  lr: 0.001
  momentum: 0.9
  solver: Adam
  weight_decay: 0.00002

scheduler_cfg:
  three_phase: True
  max_lr: 0.001
  div_factor: 100
  total_steps: 40000
  pct_start: 0.5 #学习率上升部分的比例
  scheduler: OneCycleLR

trainer_cfg:
  enable_float16: false #not use
  log_iter: 100
  with_test: true
  restore_ckpt_strict: false
  restore_hint: 0
  save_iter: 20000
  save_name: GPGait
  sync_BN: true
  total_iter: 40000
  sampler:
    batch_shuffle: false
    batch_size:
      - 8
      - 16
    frames_num_fixed: 30
    sample_type: fixed_unordered #Repeat sample
    frames_skip_num: 4
    type: TripletSampler

  transform:
    - type: Compose
      trf_cfg:
        - type: RescaleCenter
          center: 'neck'
          scale: 225
        - type: InversePosesPre
          probability: 0.1 #0.1
        - type: JointNoise
          std: 0.3 #0.2
        - type: HOD_MultiInput
          joint_format: coco
        - type: SkeletonInput